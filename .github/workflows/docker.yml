        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push inventory-service image
        uses: docker/build-push-action@v6
        with:
          context: services/inventory-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/eventflow-inventory-service:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/eventflow-inventory-service:${{ github.sha && substring(github.sha, 0, 7) || 'unknown' }}

  build-notification-service:
    name: Build & Push notification-service
    runs-on: ubuntu-latest
    if: hashFiles('services/notification-service/Dockerfile') != ''
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
