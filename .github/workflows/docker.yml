            ${{ env.REGISTRY }}/${{ github.repository_owner }}/eventflow-notification-service:${{ github.sha && substring(github.sha, 0, 7) || 'unknown' }}

  build-web-bff:
    name: Build & Push web-bff
    runs-on: ubuntu-latest
    if: hashFiles('services/web-bff/Dockerfile') != ''
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
