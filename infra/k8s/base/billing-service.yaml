apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  labels:
    app: billing-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      containers:
        - name: billing-service
          image: ghcr.io/aloysJehwin/kafka-k8s-playground/billing-service:latest
          ports:
            - containerPort: 8092
          env:
            - name: DB_URL
              value: "jdbc:postgresql://postgres-billing:5432/billing"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: eventflow-secrets
                  key: billing-db-user
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: eventflow-secrets
                  key: billing-db-password
            - name: KAFKA_BOOTSTRAP
              value: "kafka:9092"
            - name: SCHEMA_REGISTRY_URL
              value: "http://schema-registry:8081"
            - name: SERVER_PORT
              value: "8092"
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: eventflow-secrets
                  key: internal-token
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 300m
              memory: 384Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8092
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8092
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
spec:
  selector:
    app: billing-service
  ports:
    - port: 8092
      targetPort: 8092
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: billing-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: billing-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
