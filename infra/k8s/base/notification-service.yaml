apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: eventflow
spec:
  replicas: 2
  selector: { matchLabels: { app: notification-service } }
  template:
    metadata:
      labels: { app: notification-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: notification-service
          image: eventflow/notification-service:0.1.0
          ports: [{ containerPort: 8083, name: http }]
          env:
            - name: KAFKA_BOOTSTRAP
              value: eventflow-kafka-kafka-bootstrap.eventflow.svc:9092
            - name: SCHEMA_REGISTRY_URL
              value: http://schema-registry.eventflow.svc:8081
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
          resources:
            requests: { memory: 384Mi, cpu: 200m }
            limits: { memory: 768Mi, cpu: 500m }
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: http }
            initialDelaySeconds: 30
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: http }
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata: { name: notification-service, namespace: eventflow }
spec:
  selector: { app: notification-service }
  ports: [{ port: 80, targetPort: 8083 }]
