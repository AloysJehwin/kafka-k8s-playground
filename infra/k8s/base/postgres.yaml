apiVersion: apps/v1
kind: StatefulSet
metadata: { name: postgres, namespace: eventflow }
spec:
  serviceName: postgres
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - name: POSTGRES_DB
              value: orders
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: postgres-creds, key: username } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: postgres-creds, key: password } }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          resources:
            requests: { memory: 256Mi, cpu: 100m }
            limits: { memory: 512Mi, cpu: 500m }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: Service
metadata: { name: postgres, namespace: eventflow }
spec:
  clusterIP: None
  selector: { app: postgres }
  ports: [{ port: 5432 }]
---
apiVersion: v1
kind: Secret
metadata: { name: postgres-creds, namespace: eventflow }
type: Opaque
stringData:
  username: eventflow
  password: eventflow  # rotate via sealed-secrets / external-secrets in prod
