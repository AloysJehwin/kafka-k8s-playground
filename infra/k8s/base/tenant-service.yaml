apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-service
  labels:
    app: tenant-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenant-service
  template:
    metadata:
      labels:
        app: tenant-service
    spec:
      containers:
        - name: tenant-service
          image: ghcr.io/aloysJehwin/kafka-k8s-playground/tenant-service:latest
          ports:
            - containerPort: 8090
          env:
            - name: DB_URL
              value: "jdbc:postgresql://postgres-tenants:5432/tenants"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: eventflow-secrets
                  key: db-user
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: eventflow-secrets
                  key: db-password
            - name: SERVER_PORT
              value: "8090"
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: eventflow-secrets
                  key: internal-token
            - name: BILLING_SERVICE_URL
              value: "http://billing-service:8092"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8090
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: tenant-service
spec:
  selector:
    app: tenant-service
  ports:
    - port: 8090
      targetPort: 8090
  type: ClusterIP
