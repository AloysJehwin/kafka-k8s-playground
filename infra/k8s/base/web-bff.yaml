apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-bff
  namespace: eventflow
  labels:
    app: web-bff
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-bff
  template:
    metadata:
      labels:
        app: web-bff
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8085"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: web-bff
          image: ghcr.io/aloysJehwin/eventflow-web-bff:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
              name: http
          env:
            - name: KAFKA_BOOTSTRAP
              value: eventflow-kafka-kafka-bootstrap.eventflow.svc:9092
            - name: SCHEMA_REGISTRY_URL
              value: http://schema-registry.eventflow.svc:8081
            - name: ORDER_SERVICE_URL
              value: http://order-service.eventflow.svc:80
            - name: FRONTEND_URL
              value: http://web.eventflow.svc:80
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: eventflow-oauth-secrets
                  key: google-client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: eventflow-oauth-secrets
                  key: google-client-secret
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: eventflow-oauth-secrets
                  key: internal-token
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]  # let LB drain
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: web-bff
  namespace: eventflow
spec:
  selector:
    app: web-bff
  ports:
    - port: 80
      targetPort: 8085
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-bff
  namespace: eventflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-bff
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
