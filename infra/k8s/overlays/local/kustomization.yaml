apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Local overlay: lower replicas, smaller resources
patches:
  - target: { kind: Deployment, name: order-service }
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target: { kind: Deployment, name: payment-service }
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target: { kind: StatefulSet, name: inventory-service }
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target: { kind: Deployment, name: notification-service }
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target: { kind: Kafka, name: eventflow-kafka }
    patch: |-
      - op: replace
        path: /spec/kafka/replicas
        value: 1
      - op: replace
        path: /spec/zookeeper/replicas
        value: 1
