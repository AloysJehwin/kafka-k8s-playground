spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/orders/**
        - id: tenant-service
          uri: ${TENANT_SERVICE_URL:http://localhost:8090}
          predicates:
            - Path=/api/tenants/**
        - id: billing-service
          uri: ${BILLING_SERVICE_URL:http://localhost:8092}
          predicates:
            - Path=/api/billing/**

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

eventflow:
  tenant-service-url: ${TENANT_SERVICE_URL:http://localhost:8090}
  billing-service-url: ${BILLING_SERVICE_URL:http://localhost:8092}
  internal-token: ${INTERNAL_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
