spring:
  application:
    name: order-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/orders}
    username: ${DB_USER:eventflow}
    password: ${DB_PASS:eventflow}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}

server:
  port: ${SERVER_PORT:8088}
  shutdown: graceful

eventflow:
  schema-registry-url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
  outbox:
    poll-interval: 1000
  internal-token: ${INTERNAL_TOKEN:}
  app-datasource:
    # Set true in production to enforce RLS via the restricted `app` DB role.
    # Requires DB_APP_USER=app and DB_APP_PASS=<secret> in the environment.
    # Flyway and the outbox relay continue to run as the `eventflow` superuser.
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

resilience4j:
  circuitbreaker:
    instances:
      orders:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 30s

logging:
  level:
    org.springframework.kafka: INFO
    com.eventflow: DEBUG
  pattern:
    level: '%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]'
