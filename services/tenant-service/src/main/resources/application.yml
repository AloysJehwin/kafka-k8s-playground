spring:
  application:
    name: tenant-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/tenants}
    username: ${DB_USER:eventflow}
    password: ${DB_PASS:eventflow}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: ${SERVER_PORT:8090}
  shutdown: graceful

eventflow:
  internal-token: ${INTERNAL_TOKEN:}
  billing-service-url: ${BILLING_SERVICE_URL:http://localhost:8092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
